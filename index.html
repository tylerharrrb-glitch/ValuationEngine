  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%230A0E17'/%3E%3Ctext x='32' y='40' font-family='serif' font-weight='900' font-size='18' fill='%23C9A84C' text-anchor='middle'%3EWOLF%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WOLF Valuation Engine - Institutional-grade equity valuation with DCF, Monte Carlo simulation, and Comparable Company Analysis" />

    <title>WOLF | Valuation Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #0A0E17;
        overflow-x: hidden;
      }
      /* Loading state */
      .wolf-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #0A0E17 0%, #0F1623 100%);
      }
      .wolf-loading-text {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 900;
        font-size: 2.5rem;
        letter-spacing: .15em;
        color: #C9A84C;
        animation: wolfPulse 2s ease-in-out infinite;
      }
      @keyframes wolfPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="wolf-loading">
        <span class="wolf-loading-text">WOLF</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
